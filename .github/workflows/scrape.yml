name: Scrape Raadsleden

on:
  schedule:
    - cron: "0 5 * * 1"  # Elke maandag 05:00 UTC
  workflow_dispatch:
    inputs:
      gemeente:
        description: "Gemeente ID (leeg = alle gemeenten)"
        required: false
        default: ""

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependencies installeren
        run: pip install requests beautifulsoup4

      - name: Raadsleden scrapen
        run: |
          GEMEENTE="${{ github.event.inputs.gemeente }}"
          if [ -n "$GEMEENTE" ]; then
            python scrape_raadsleden.py "$GEMEENTE"
          else
            python scrape_raadsleden.py
          fi

      - name: Wijzigingen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/*/gemeente_data.json || true
          git diff --staged --quiet || git commit -m "Raadsleden bijgewerkt [skip ci]"
          git pull --no-rebase -X ours && git push
