name: Migreer naar gemeente-structuur

on:
  workflow_dispatch:

jobs:
  migreer:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Migratie uitvoeren
        run: python migreer_naar_gemeente_structuur.py

      - name: Oude bestanden verwijderen
        run: |
          git rm docs/feed.xml || true
          git rm docs/seen.json || true
          git rm -r docs/transcripties/ || true
          git rm docs/namen_cache.json || true
          git rm docs/vocabulary_cache.json || true

      - name: Wijzigingen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/texel/ || true
          git diff --staged --quiet || git commit -m "Migratie naar gemeente-mapstructuur [skip ci]"
          git pull --rebase && git push
