name: Check Officiële Transcriptie

on:
  schedule:
    # Elke dag om 06:00 UTC (= 08:00 Nederlandse tijd)
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependencies installeren
        run: pip install pdfminer.six requests

      - name: Officiële transcripties checken
        run: python check_officiele_transcriptie.py

      - name: Wijzigingen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/transcripties/ || true
          git diff --staged --quiet || git commit -m "Officiële transcriptie(s) bijgewerkt [skip ci]"
          git pull --rebase && git push
